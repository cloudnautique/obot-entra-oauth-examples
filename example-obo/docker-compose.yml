version: '3.8'

services:
  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
     environment:
        - AZURE_TENANT_ID=${AZURE_TENANT_ID}
        - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
        - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
        - BASE_URL=http://localhost:8000
        - SERVER_HOST=0.0.0.0
        - SERVER_PORT=8000
    depends_on:
      - caddy
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config: